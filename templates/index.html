<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Automação de Relatórios</title>
    <style>
        * {
            box-sizing: border-box;
        }

        :root {
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --success: #10b981;
        }
        
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background-color: var(--card-bg);
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            max-width: 800px;
            width: 100%;
            text-align: center;
        }

        h2 {
            margin-top: 0;
            margin-bottom: 2rem;
            font-size: 1.5rem;
        }

        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s ease, transform 0.1s ease;
            width: 100%;
        }

        button:hover:not(:disabled) {
            background-color: var(--primary-hover);
        }

        button:active:not(:disabled) {
            transform: scale(0.98);
        }

        #status-message {
            margin-top: 1.5rem;
            font-size: 0.875rem;
            font-weight: 500;
            min-height: 20px;
        }
        
        .pulse-indicator {
            display: inline-block;
            width: 8px;
            height: 8px;
            background-color: var(--success);
            border-radius: 50%;
            margin-right: 6px;
            animation: pulse 2s infinite;
        }

        .upload-area {
            border: 2px dashed var(--primary);
            border-radius: 12px;
            padding: 2rem 1rem;
            margin-bottom: 1.5rem;
            background-color: #f8fafc;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .upload-area:hover, .upload-area.dragover {
            background-color: #eff6ff;
            border-color: var(--primary-hover);
        }

        .upload-area p {
            margin: 0;
            color: var(--primary);
            font-weight: 500;
        }
        
        .upload-area small {
            color: var(--text-muted);
            display: block;
            margin-top: 8px;
        }

        #file-info {
            font-size: 0.9rem;
            color: var(--text-main);
            margin-bottom: 1rem;
            font-weight: 600;
        }

        .replacements-container {
            margin-bottom: 1.5rem;
            text-align: left;
            background: #f8fafc;
            padding: 1rem;
            border-radius: 12px;
            border: 1px solid #e5e7eb;
        }

        .rule-row {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
            align-items: center;
        }

        .custom-input {
            flex: 1;
            min-width: 0;
            padding: 10px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 0.875rem;
            outline: none;
            transition: border-color 0.2s, height 0.2s ease, box-shadow 0.2s ease;
            font-family: inherit;
            resize: none; 
            overflow: hidden; 
            line-height: 1.5;
            min-height: 42px; 
            background-color: #ffffff;
        }

        .custom-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15); 
            z-index: 10; 
        }
        
        .input-de, .input-para {
            white-space: pre-wrap; 
        }

        .input-de:focus, .input-para:focus {
             min-height: 100px;
             overflow-y: auto; 
        }

        .btn-secondary {
            background-color: transparent;
            color: var(--primary);
            border: 1px dashed var(--primary);
            padding: 8px 16px;
            font-size: 0.875rem;
            width: 100%;
            margin-top: 5px;
        }

        .btn-secondary:hover {
            background-color: #eff6ff;
        }

        .btn-remove {
            background-color: #fee2e2;
            color: #ef4444;
            border: none;
            border-radius: 6px;
            padding: 10px;
            cursor: pointer;
            width: auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .btn-remove:hover {
            background-color: #fca5a5;
            color: white;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(16, 185, 129, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>Gerador de Relatórios</h2>
        
        <div class="upload-area" id="drop-zone">
            <p>Arraste seu arquivo aqui</p>
            <small>ou clique para selecionar (.docx, .pptx)</small>
            <input type="file" id="file-input" style="display: none;" accept=".docx,.pptx">
        </div>
        
        <div id="file-info">Nenhum arquivo selecionado</div>

        <div class="replacements-container">
            <h3 style="font-size: 1rem; margin-bottom: 0.75rem; margin-top: 0; color: var(--text-main);">Termos para substituir</h3>
            <div id="rules-list">
                <!-- Inputs gerados dinamicamente -->
            </div>
            <button type="button" id="add-rule-btn" class="btn-secondary">+ Adicionar termo extra</button>
        </div>

        <button id="process-btn" disabled style="opacity: 0.5; cursor: not-allowed;">Processar Arquivo</button>
        
        <div id="status-message">
            <span class="pulse-indicator"></span> Aguardando...
        </div>
    </div>

    <script>
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const fileInfo = document.getElementById('file-info');
        const processBtn = document.getElementById('process-btn');
        const rulesList = document.getElementById('rules-list');
        const addRuleBtn = document.getElementById('add-rule-btn');
        
        let selectedFile = null;

        function createRuleRow(prefilledDe = "") {
            const row = document.createElement('div');
            row.className = 'rule-row';
            
            const applyAutoExpand = (element) => {
                element.addEventListener('input', function() {
                    if(document.activeElement !== this) return; 
                    this.style.height = 'auto'; 
                    this.style.height = (this.scrollHeight) + 'px'; 
                });
                element.addEventListener('blur', function() {
                    this.style.height = '42px';
                    this.scrollTop = 0; 
                });
                element.addEventListener('focus', function() {
                   this.style.height = (this.scrollHeight) + 'px'; 
                });
            };

            const inputDe = document.createElement('textarea');
            inputDe.className = 'custom-input input-de';
            inputDe.placeholder = 'Tag [EXEMPLO]';
            inputDe.rows = 1;
            inputDe.value = prefilledDe; // Preenche se houver tag
            applyAutoExpand(inputDe);
            
            const span = document.createElement('span');
            span.innerHTML = '&rarr;';
            span.style.color = 'var(--text-muted)';
            
            const inputPara = document.createElement('textarea');
            inputPara.className = 'custom-input input-para';
            inputPara.placeholder = 'Novo texto...';
            inputPara.rows = 1;
            applyAutoExpand(inputPara);
            
            const btnRemove = document.createElement('button');
            btnRemove.className = 'btn-remove';
            btnRemove.innerHTML = '✕';
            btnRemove.type = 'button';
            btnRemove.onclick = () => row.remove();
            
            row.appendChild(inputDe);
            row.appendChild(span);
            row.appendChild(inputPara);
            row.appendChild(btnRemove);
            
            return row;
        }

        addRuleBtn.addEventListener('click', () => {
            rulesList.appendChild(createRuleRow());
        });

        // Inicializa com uma vazia
        rulesList.appendChild(createRuleRow());

        dropZone.addEventListener('click', () => fileInput.click());

        fileInput.addEventListener('change', (e) => {
            handleFileSelect(e.target.files[0]);
        });

        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            if (e.dataTransfer.files.length > 0) {
                handleFileSelect(e.dataTransfer.files[0]);
            }
        });

        function handleFileSelect(file) {
            if (!file) return;
            
            const validExtensions = ['.docx', '.pptx'];
            const fileExtension = file.name.substring(file.name.lastIndexOf('.')).toLowerCase();
            
            if (!validExtensions.includes(fileExtension)) {
                fileInfo.innerHTML = '<span style="color: red;">Apenas arquivos Word/PowerPoint permitidos.</span>';
                selectedFile = null;
                processBtn.disabled = true;
                processBtn.style.opacity = '0.5';
                processBtn.style.cursor = 'not-allowed';
                return;
            }

            selectedFile = file;
            
            // FEEDBACK VISUAL: Mostra que está carregando as tags
            fileInfo.innerHTML = `Arquivo pronto: ${file.name} <br><small style="color:var(--primary);">Buscando tags no documento...</small>`;
            
            // BUSCA AUTOMÁTICA DE TAGS
            const formData = new FormData();
            formData.append('documento', file);
            
            fetch('/extrair_tags', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                if(data.error) throw new Error(data.error);
                
                const tags = data.tags;
                fileInfo.innerHTML = `Arquivo pronto: <b>${file.name}</b> <br><small style="color:var(--success);">✓ ${tags.length} tags encontradas</small>`;
                
                // Limpa a lista atual e preenche com as tags achadas
                rulesList.innerHTML = '';
                
                if(tags.length > 0) {
                    // Ordena as tags em ordem alfabética para ficar organizado
                    tags.sort().forEach(tag => {
                        rulesList.appendChild(createRuleRow(tag));
                    });
                } else {
                    // Se não achar nada, coloca uma linha vazia padrão
                    rulesList.appendChild(createRuleRow());
                }
                
                processBtn.disabled = false;
                processBtn.style.opacity = '1';
                processBtn.style.cursor = 'pointer';
            })
            .catch(error => {
                fileInfo.innerHTML = `Arquivo pronto: ${file.name} <br><small style="color:red;">Falha ao buscar tags. Adicione manualmente.</small>`;
                rulesList.innerHTML = '';
                rulesList.appendChild(createRuleRow());
                
                processBtn.disabled = false;
                processBtn.style.opacity = '1';
                processBtn.style.cursor = 'pointer';
            });
        }

        processBtn.addEventListener('click', function() {
            if (!selectedFile) return;

            const statusDiv = document.getElementById('status-message');
            this.disabled = true;
            this.style.opacity = '0.5';
            this.innerText = 'Processando arquivo...';
            statusDiv.innerHTML = '<span class="pulse-indicator"></span> Processando e gerando arquivo...';
            
            const formData = new FormData();
            formData.append('documento', selectedFile);

            const rules = [];
            document.querySelectorAll('.rule-row').forEach(row => {
                const de = row.querySelector('.input-de').value;
                const para = row.querySelector('.input-para').value;
                if(de.trim() !== '') rules.push({ de: de, para: para });
            });
            formData.append('substituicoes', JSON.stringify(rules));

            fetch('/processar', {
                method: 'POST',
                body: formData
            })
            .then(async response => {
                if (!response.ok) throw new Error("Erro no servidor ao processar o arquivo.");
                
                let filename = "Modificado_" + selectedFile.name;
                const disposition = response.headers.get('Content-Disposition');
                if (disposition && disposition.includes('filename=')) {
                    filename = disposition.split('filename="')[1].slice(0, -1);
                }
                
                const blob = await response.blob();
                return { blob, filename };
            })
            .then(async ({ blob, filename }) => {
                statusDiv.innerHTML = '<span style="color: var(--success)">✓ Pronto! Escolha onde salvar...</span>';
                
                try {
                    if (window.showSaveFilePicker) {
                        const fileHandle = await window.showSaveFilePicker({
                            suggestedName: filename,
                            types: [{
                                description: 'Documento Modificado',
                                accept: {
                                    'application/vnd.openxmlformats-officedocument.wordprocessingml.document': ['.docx'],
                                    'application/vnd.openxmlformats-officedocument.presentationml.presentation': ['.pptx']
                                }
                            }]
                        });
                        const writable = await fileHandle.createWritable();
                        await writable.write(blob);
                        await writable.close();
                        statusDiv.innerHTML = '<span style="color: var(--success)">✓ Arquivo salvo com sucesso!</span>';
                    } else {
                        throw new Error("Fallback");
                    }
                } catch (err) {
                    if (err.name !== 'AbortError') {
                        const urlBlob = window.URL.createObjectURL(blob);
                        const a = document.createElement('a');
                        a.href = urlBlob;
                        a.download = filename;
                        document.body.appendChild(a);
                        a.click();
                        document.body.removeChild(a);
                        window.URL.revokeObjectURL(urlBlob);
                        statusDiv.innerHTML = '<span style="color: var(--success)">✓ Download automático concluído!</span>';
                    } else {
                        statusDiv.innerHTML = '<span style="color: var(--text-muted)">Salvamento cancelado pelo usuário.</span>';
                    }
                }

                this.innerText = 'Processar Outro Arquivo';
                this.disabled = false;
                this.style.opacity = '1';
                
            })
            .catch(error => {
                statusDiv.innerHTML = '<span style="color: red;">✗ Erro: ' + error.message + '</span>';
                this.disabled = false;
                this.style.opacity = '1';
                this.innerText = 'Tentar Novamente';
            });
        });

        // Heartbeat
        setInterval(() => {
            fetch('/heartbeat', { 
                method: 'POST',
                headers: { 'Content-Type': 'application/json' }
            }).catch(() => {
                const statusDiv = document.getElementById('status-message');
                statusDiv.innerHTML = '<span style="color: red; font-weight:bold;">✗ Conexão Perdida com o Servidor</span>';
            });
        }, 3000);
    </script>
</body>
</html>

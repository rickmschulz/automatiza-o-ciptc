<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Automação de Relatórios</title>
    <style>
        * {
            box-sizing: border-box;
        }

        :root {
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --success: #10b981;
        }
        
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background-color: var(--card-bg);
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        h2 {
            margin-top: 0;
            margin-bottom: 2rem;
            font-size: 1.5rem;
        }

        p {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 2rem;
            line-height: 1.5;
        }

        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s ease, transform 0.1s ease;
            width: 100%;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        button:active {
            transform: scale(0.98);
        }

        #status-message {
            margin-top: 1.5rem;
            font-size: 0.875rem;
            font-weight: 500;
            min-height: 20px; /* Evita pulo de layout */
        }
        
        .pulse-indicator {
            display: inline-block;
            width: 8px;
            height: 8px;
            background-color: var(--success);
            border-radius: 50%;
            margin-right: 6px;
            animation: pulse 2s infinite;
        }

        .upload-area {
            border: 2px dashed var(--primary);
            border-radius: 12px;
            padding: 2rem 1rem;
            margin-bottom: 1.5rem;
            background-color: #f8fafc;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .upload-area:hover, .upload-area.dragover {
            background-color: #eff6ff;
            border-color: var(--primary-hover);
        }

        .upload-area p {
            margin: 0;
            color: var(--primary);
            font-weight: 500;
        }
        
        .upload-area small {
            color: var(--text-muted);
            display: block;
            margin-top: 8px;
        }

        #file-info {
            font-size: 0.9rem;
            color: var(--text-main);
            margin-bottom: 1rem;
            font-weight: 600;
        }

        .replacements-container {
            margin-bottom: 1.5rem;
            text-align: left;
            background: #f8fafc;
            padding: 1rem;
            border-radius: 12px;
            border: 1px solid #e5e7eb;
        }

        .rule-row {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
            align-items: center;
        }

        .custom-input {
            flex: 1;
            min-width: 0;
            padding: 10px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 0.875rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .custom-input:focus {
            border-color: var(--primary);
        }

        .btn-secondary {
            background-color: transparent;
            color: var(--primary);
            border: 1px dashed var(--primary);
            padding: 8px 16px;
            font-size: 0.875rem;
            width: 100%;
            margin-top: 5px;
        }

        .btn-secondary:hover {
            background-color: #eff6ff;
        }

        .btn-remove {
            background-color: #fee2e2;
            color: #ef4444;
            border: none;
            border-radius: 6px;
            padding: 10px;
            cursor: pointer;
            width: auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .btn-remove:hover {
            background-color: #fca5a5;
            color: white;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(16, 185, 129, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>Gerador de Relatórios</h2>
        
        <div class="upload-area" id="drop-zone">
            <p>Arraste seu arquivo aqui</p>
            <small>ou clique para selecionar (.docx, .pptx)</small>
            <input type="file" id="file-input" style="display: none;" accept=".docx,.pptx">
        </div>
        
        <div id="file-info">Nenhum arquivo selecionado</div>

        <div class="replacements-container">
            <h3 style="font-size: 1rem; margin-bottom: 0.75rem; margin-top: 0; color: var(--text-main);">Termos para substituir</h3>
            <div id="rules-list">
                <!-- As linhas de inputs serão criadas aqui via JavaScript -->
            </div>
            <button type="button" id="add-rule-btn" class="btn-secondary">+ Adicionar novo termo</button>
        </div>

        <button id="process-btn" disabled style="opacity: 0.5; cursor: not-allowed;">Processar Arquivo</button>
        
        <div id="status-message">
            <span class="pulse-indicator"></span> Aguardando...
        </div>
    </div>

    <script>
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const fileInfo = document.getElementById('file-info');
        const processBtn = document.getElementById('process-btn');
        
        const rulesList = document.getElementById('rules-list');
        const addRuleBtn = document.getElementById('add-rule-btn');
        let selectedFile = null;

        // Função para criar uma nova linha de inputs (De -> Para)
        function createRuleRow() {
            const row = document.createElement('div');
            row.className = 'rule-row';
            
            // Campo de busca
            const inputDe = document.createElement('input');
            inputDe.type = 'text';
            inputDe.className = 'custom-input input-de';
            inputDe.placeholder = 'Ex: 21/07/2026';
            
            // Separador visual
            const span = document.createElement('span');
            span.innerHTML = '&rarr;';
            span.style.color = 'var(--text-muted)';
            
            // Campo de substituição
            const inputPara = document.createElement('input');
            inputPara.type = 'text';
            inputPara.className = 'custom-input input-para';
            inputPara.placeholder = 'Ex: 01/08/2026';
            
            // Botão de remover a linha
            const btnRemove = document.createElement('button');
            btnRemove.className = 'btn-remove';
            btnRemove.innerHTML = '✕';
            btnRemove.type = 'button';
            btnRemove.onclick = () => row.remove();
            
            row.appendChild(inputDe);
            row.appendChild(span);
            row.appendChild(inputPara);
            row.appendChild(btnRemove);
            
            return row;
        }

        // Evento para adicionar nova linha quando clicar no botão
        addRuleBtn.addEventListener('click', () => {
            rulesList.appendChild(createRuleRow());
        });

        // Inicializa com uma linha vazia por padrão
        rulesList.appendChild(createRuleRow());

        // Ao clicar na área, abre o seletor de arquivos do sistema
        dropZone.addEventListener('click', () => fileInput.click());

        // Lida com a seleção tradicional via clique
        fileInput.addEventListener('change', (e) => {
            handleFileSelect(e.target.files[0]);
        });

        // Eventos de arrastar e soltar
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            
            if (e.dataTransfer.files.length > 0) {
                handleFileSelect(e.dataTransfer.files[0]);
            }
        });

        // Função para atualizar a interface quando um arquivo é escolhido
        function handleFileSelect(file) {
            if (!file) return;
            
            // Verifica a extensão (opcional, mas recomendado)
            const validExtensions = ['.docx', '.pptx'];
            const fileExtension = file.name.substring(file.name.lastIndexOf('.')).toLowerCase();
            
            if (!validExtensions.includes(fileExtension)) {
                fileInfo.innerHTML = '<span style="color: red;">Apenas arquivos Word ou PowerPoint são permitidos.</span>';
                selectedFile = null;
                processBtn.disabled = true;
                processBtn.style.opacity = '0.5';
                processBtn.style.cursor = 'not-allowed';
                return;
            }

            selectedFile = file;
            fileInfo.innerText = `Arquivo pronto: ${file.name}`;
            
            // Habilita o botão
            processBtn.disabled = false;
            processBtn.style.opacity = '1';
            processBtn.style.cursor = 'pointer';
        }

        // Lógica de envio do arquivo para o backend Python
        processBtn.addEventListener('click', function() {
            if (!selectedFile) return;

            const statusDiv = document.getElementById('status-message');
            this.disabled = true;
            this.style.opacity = '0.5';
            this.innerText = 'Enviando e processando...';
            
            // Prepara o arquivo para envio via FormData
            const formData = new FormData();
            formData.append('documento', selectedFile);

            // 1. Captura todas as regras preenchidas na interface
            const rules = [];
            const rows = document.querySelectorAll('.rule-row');
            
            rows.forEach(row => {
                const de = row.querySelector('.input-de').value;
                const para = row.querySelector('.input-para').value;
                // Só adiciona se o campo "De" estiver preenchido
                if(de.trim() !== '') {
                    rules.push({ de: de, para: para });
                }
            });
            
            // 2. Transforma o array de regras em um texto JSON e adiciona ao envio
            formData.append('substituicoes', JSON.stringify(rules));

            // Chama a nova rota Python
            fetch('/processar', {
                method: 'POST',
                body: formData
            })
            .then(async response => {
                // Como não usamos mais JSON, precisamos checar se houve erro pelo HTTP Status
                if (!response.ok) {
                    const errText = await response.text();
                    throw new Error(errText || "Erro no servidor ao processar o arquivo.");
                }
                
                // Tenta puxar o nome sugerido do cabeçalho de resposta, ou cria um padrão
                let filename = "Modificado_" + selectedFile.name;
                const disposition = response.headers.get('Content-Disposition');
                if (disposition && disposition.includes('filename=')) {
                    filename = disposition.split('filename=')[1].replace(/"/g, '');
                }
                
                // Converte a resposta bruta no arquivo Blob real
                const blob = await response.blob();
                return { blob, filename };
            })
            .then(async ({ blob, filename }) => {
                statusDiv.innerHTML = '<span style="color: var(--success)">✓ Processamento concluído!</span>';
                
                try {
                    // Tenta invocar a janela moderna de salvar
                    if (window.showSaveFilePicker) {
                        const fileHandle = await window.showSaveFilePicker({
                            suggestedName: filename,
                            types: [{
                                description: 'Documento Modificado',
                                accept: {
                                    'application/vnd.openxmlformats-officedocument.wordprocessingml.document': ['.docx'],
                                    'application/vnd.openxmlformats-officedocument.presentationml.presentation': ['.pptx']
                                }
                            }]
                        });
                        
                        const writable = await fileHandle.createWritable();
                        await writable.write(blob);
                        await writable.close();
                        statusDiv.innerHTML = '<span style="color: var(--success)">✓ Arquivo salvo com sucesso!</span>';
                    } else {
                        // Força o "Plano B" em navegadores incompatíveis (ex: Firefox/Safari)
                        throw new Error("Fallback de Download");
                    }
                } catch (err) {
                    // PLANO B: Se der erro de segurança (demora) ou não suportar, faz o download automático sem travar a interface!
                    if (err.name !== 'AbortError') {
                        console.log("Acionando fallback de download clássico...");
                        const urlBlob = window.URL.createObjectURL(blob);
                        const a = document.createElement('a');
                        a.href = urlBlob;
                        a.download = filename;
                        document.body.appendChild(a);
                        a.click();
                        document.body.removeChild(a);
                        window.URL.revokeObjectURL(urlBlob);
                        statusDiv.innerHTML = '<span style="color: var(--success)">✓ Download automático concluído!</span>';
                    } else {
                        statusDiv.innerHTML = '<span style="color: var(--text-muted)">Salvamento cancelado pelo usuário.</span>';
                    }
                }

                // Libera a interface para uso novamente independente de qual rota tomou
                this.innerText = 'Processar Outro Arquivo';
                this.disabled = false;
                this.style.opacity = '1';
                selectedFile = null;
                fileInfo.innerText = 'Nenhum arquivo selecionado';
                fileInput.value = '';
            })
            .catch(error => {
                statusDiv.innerHTML = '<span style="color: red;">✗ Erro: ' + error.message + '</span>';
                this.disabled = false;
                this.style.opacity = '1';
                this.innerText = 'Tentar Novamente';
            });
        });

        // LÓGICA DO HEARTBEAT
        // Envia um ping para o backend a cada 3 segundos
        setInterval(() => {
            fetch('/heartbeat', { 
                method: 'POST',
                headers: { 'Content-Type': 'application/json' }
            })
            .then(response => {
                if(!response.ok) throw new Error("Servidor offline");
            })
            .catch(error => {
                // Se falhar silenciosamente, o servidor provavelmente já caiu
                console.log('Falha ao enviar pulso. Servidor pode estar desligado.');
                const statusDiv = document.getElementById('status-message');
                statusDiv.innerHTML = '<span style="color: red; font-weight:bold;">✗ Conexão Perdida</span>';
            });
        }, 3000);
    </script>
</body>
</html>
